services:
  app:
    build: .
    container_name: shipment_app
    ports:
      - "50051:50051"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=shipment_db
      - POSTGRES_SSLMODE=disable
      - GRPC_PORT=50051
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shipment_network

  db:
    image: postgres:15-alpine
    container_name: shipment_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shipment_db
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shipment_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shipment_db"]
      interval: 2s
      timeout: 2s
      retries: 5

volumes:
  postgres_data:

networks:
  shipment_network:
    driver: bridge